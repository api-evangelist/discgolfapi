naftiko: 1.0.0-alpha2
info:
  label: DiscGolfAPI REST API
  description: >-
    Shared definition of the public DiscGolfAPI HTTP API. DiscGolfAPI is a free,
    read-only service that publishes structured disc golf course data: course
    listings, course detail by stable public ID, country and region coverage
    indexes, recent update feed, and the dataset manifest with content-addressable
    JSON artefacts. Public read endpoints do not require an API key. Consumers
    must follow the DiscGolfAPI licence — visible attribution is required where
    data is displayed.
  tags:
    - Disc Golf
    - Courses
    - Open Data
    - Recreation
  created: '2026-05-16'
  modified: '2026-05-16'
capability:
  consumes:
    - type: http
      namespace: discgolfapi
      baseUri: https://io.discgolfapi.com/v1
      description: DiscGolfAPI public REST API.
      authentication:
        type: none
      resources:
        - name: courses
          path: /courses
          description: Public course list with country, region, limit, and offset filters.
          operations:
            - name: list-courses
              method: GET
              description: List public disc golf course records, optionally filtered by country and region.
              inputParameters:
                - name: country
                  in: query
                  type: string
                  required: false
                  description: Country code filter (ISO 3166-1 alpha-2).
                - name: region
                  in: query
                  type: string
                  required: false
                  description: Region, state, or subdivision code filter where supported.
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: Maximum number of records to return. Must be a positive integer.
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: Number of matching records to skip before returning the current page.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
        - name: course
          path: /courses/{id}
          description: Public course detail by stable public course ID (pattern crs_*).
          operations:
            - name: get-course
              method: GET
              description: Get a single course by stable public course ID.
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: Stable public course ID matching pattern ^crs_[a-z0-9_]+$.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
        - name: countries
          path: /countries
          description: Country coverage index.
          operations:
            - name: list-countries
              method: GET
              description: List countries represented in the current public dataset, with course counts.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
        - name: regions
          path: /regions
          description: Region, state, and subdivision coverage index.
          operations:
            - name: list-regions
              method: GET
              description: List regions, states, and subdivisions represented in the current public dataset.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
        - name: recent-updates
          path: /updates/recent
          description: Recent public dataset updates.
          operations:
            - name: list-recent-updates
              method: GET
              description: List recent course additions or changes in the public dataset.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
    - type: http
      namespace: discgolfapi-meta
      baseUri: https://io.discgolfapi.com
      description: DiscGolfAPI metadata root (manifest is published at the metadata root, not under /v1).
      authentication:
        type: none
      resources:
        - name: manifest
          path: /manifest.json
          description: Dataset manifest with publish version, generated timestamp, dataset counts, and content-addressable artefact metadata.
          operations:
            - name: get-manifest
              method: GET
              description: Get the current public dataset manifest.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
