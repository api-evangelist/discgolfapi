naftiko: 1.0.0-alpha2
info:
  label: DiscGolfAPI — Courses
  description: 'DiscGolfAPI — Courses. 2 operations. Lead operation: List Courses. Self-contained Naftiko capability covering
    one Discgolfapi business surface.'
  tags:
  - Discgolfapi
  - Courses
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DISCGOLFAPI_API_KEY: DISCGOLFAPI_API_KEY
capability:
  consumes:
  - type: http
    namespace: discgolfapi-courses
    baseUri: https://io.discgolfapi.com/v1
    description: DiscGolfAPI — Courses business capability. Self-contained, no shared references.
    resources:
    - name: courses
      path: /courses
      operations:
      - name: listcourses
        method: GET
        description: List Courses
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: courses-id
      path: /courses/{id}
      operations:
      - name: getcourse
        method: GET
        description: Get a Course by ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: discgolfapi-courses-rest
    port: 8080
    description: REST adapter for DiscGolfAPI — Courses. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/courses
      name: courses
      description: REST surface for courses.
      operations:
      - method: GET
        name: listcourses
        description: List Courses
        call: discgolfapi-courses.listcourses
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/courses/{id}
      name: courses-id
      description: REST surface for courses-id.
      operations:
      - method: GET
        name: getcourse
        description: Get a Course by ID
        call: discgolfapi-courses.getcourse
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: discgolfapi-courses-mcp
    port: 9090
    transport: http
    description: MCP adapter for DiscGolfAPI — Courses. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-courses
      description: List Courses
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: discgolfapi-courses.listcourses
      outputParameters:
      - type: object
        mapping: $.
    - name: get-course-id
      description: Get a Course by ID
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: discgolfapi-courses.getcourse
      outputParameters:
      - type: object
        mapping: $.
